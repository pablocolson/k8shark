# Default values for k8shark.

image:
  registry: ghcr.io/pablocolson
  # binary image runs both the hub and the worker
  binary: k8shark
  # front image is nginx serving the built dashboard
  front: k8shark-front
  tag: latest
  # pullPolicy: leave empty (default) to let the chart choose automatically —
  # Always for a mutable "latest"/empty tag (so an upgrade actually re-pulls
  # instead of a node's cached "latest" silently causing a no-op upgrade) and
  # IfNotPresent for a pinned immutable tag. Set explicitly to override either
  # way. See templates/_helpers.tpl's k8shark.imagePullPolicy.
  pullPolicy: ""

# imagePullSecrets: pull-secret names added to every pod spec (hub, worker,
# front) — needed when image.registry is private. Standard list form,
# e.g. [{name: my-registry-secret}]; create the Secret itself out-of-band.
imagePullSecrets: []

# priorityClassName is applied to the hub pods when set (empty = cluster default).
priorityClassName: ""

# pdb: PodDisruptionBudget for the hub. minAvailable: 1 protects the
# single-replica hub during voluntary disruptions (node drains). Skipped
# automatically if hub.replicas < 1.
pdb:
  enabled: true

hub:
  port: 8898
  # replicas: must stay 1. The ring buffer, worker registry, filter facets and
  # front WebSocket fan-out are all in-memory state local to one pod — there
  # is no shared backing store, so a second replica would silently see only
  # half the workers/clients rather than sharing state. The chart refuses to
  # render with a higher value (see templates/hub.yaml).
  replicas: 1
  # bufferSize: how many recent entries the hub keeps in memory (0 = built-in
  # default, 10000). At 1k entries/s the default is only ~10s of history —
  # raise it (with the memory limit) when debugging busy clusters.
  bufferSize: 0
  # apiToken: when set, /api and the WebSocket endpoints require
  # `Authorization: Bearer <token>` (browser WebSockets can use a
  # `Sec-WebSocket-Protocol: bearer.<token>` subprotocol instead; ?token= also
  # works but is deprecated — it leaks into logs/history). Workers and the front
  # proxy receive it automatically via a Secret; port-forward users pass it by hand.
  # Empty (default) keeps the API open — anyone who can reach the hub Service
  # can read all captured traffic. `k8shark tap` auto-generates a token unless
  # given --no-auth or an explicit `--set hub.apiToken=...`; installing
  # straight from this chart (helm install, not tap) still defaults to open.
  apiToken: ""
  # workerToken: when set, /ws/worker (the entry-ingest channel) requires this
  # distinct token instead of apiToken — a leaked read token can then no
  # longer inject forged entries, and a compromised worker credential cannot
  # read captured traffic. The worker DaemonSet picks it up automatically.
  # Empty falls back to apiToken (single-token behavior).
  workerToken: ""
  # adminToken: when set, mutating API calls (POST /api/workers/capture —
  # pausing capture cluster-wide) require this distinct token; it also grants
  # reads. The front's nginx proxy only injects apiToken, so dashboard users
  # lose the pause/resume controls once this is set — pass the admin token by
  # hand (port-forward + Authorization header) when you need them.
  # Empty falls back to apiToken (single-token behavior).
  adminToken: ""
  # tls: serve the hub API/WebSockets over HTTPS/wss, so captured traffic
  # (including eBPF-decrypted TLS bodies) and bearer tokens stop crossing the
  # cluster network in clear text. Workers switch to wss:// automatically and
  # the front nginx proxies over https; probes and scrape config follow.
  # Alternative: leave this off and run a service mesh providing mTLS.
  tls:
    enabled: false
    # secretName: a kubernetes.io/tls Secret in the release namespace
    # (tls.crt/tls.key) — a cert-manager Certificate works as-is. The cert
    # must cover k8shark-hub.<namespace>.svc. Required when enabled.
    secretName: ""
    # caFromSecret: project the secret's ca.crt (cert-manager includes it)
    # into workers so they verify the hub cert against the issuing CA; only
    # the ca.crt key is mounted, never the private key. Disable when the
    # cert chains to a public/system root.
    caFromSecret: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
  # export: optional continuous export of every captured entry to an external
  # system, tapping the hub's fan-out (distinct from in-memory retention). Both
  # backends are opt-in and non-blocking — a full buffer drops entries and
  # counts them (k8shark_hub_export_dropped_total) rather than slowing capture.
  # (OTLP is not implemented yet.)
  export:
    # file: append each entry as JSONL to this path (rotates by size).
    file: ""
    # webhook: POST batches of entries (a JSON array) to this URL.
    webhook: ""
  # nodeSelector / affinity / tolerations: standard scheduling constraints
  # for the hub pod, passed through verbatim.
  nodeSelector: {}
  affinity: {}
  tolerations: []
  # podAnnotations: extra annotations on the hub pod template, merged key-wise
  # over the chart's default prometheus.io/* scrape annotations (yours win).
  podAnnotations: {}
  # extraLabels: extra labels on the hub pod template.
  extraLabels: {}

front:
  port: 80
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi
  # nodeSelector / affinity / tolerations: standard scheduling constraints
  # for the front pod, passed through verbatim.
  nodeSelector: {}
  affinity: {}
  tolerations: []
  # podAnnotations / extraLabels: extra metadata on the front pod template.
  podAnnotations: {}
  extraLabels: {}

worker:
  # demo: generate synthetic traffic instead of capturing real packets.
  # Handy for a first look on clusters where privileged capture is disallowed.
  demo: false
  # capture interface ("" = any)
  iface: ""
  # valkeyPorts: RESP ports to relabel as "valkey" instead of "redis" in the
  # dashboard. Valkey and Redis speak the identical wire protocol, so this is
  # config-driven, not auto-detected. e.g. [6379] if that port runs Valkey.
  valkeyPorts: []
  # amqpPorts: extra ports carrying AMQP 0-9-1 (RabbitMQ), in addition to the
  # 5672 default. e.g. [5673] for a second broker port.
  amqpPorts: []
  # httpPorts: extra TCP ports carrying HTTP, in addition to the 80/8080
  # defaults — e.g. [3000, 8000, 9090] for common non-standard app ports.
  # Userspace already dissects HTTP on any port not claimed by redis/postgres/
  # amqp; this only admits the port through the kernel-level capture filter
  # (see internal/worker/capture/bpf.go), without which it's silently dropped
  # before the worker ever sees it.
  httpPorts: []
  # capture: per-direction extraction depth bounds. Defaults preserve the built-in
  # behaviour (bodies captured, 4096 B body cap, 2048 B raw hex cap).
  capture:
    captureBodies: true # set false to omit request/response bodies entirely
    bodyBytes: 0        # 0 = default 4096; max body bytes per direction
    rawBytes: 0         # 0 = default 2048; <0 disables the raw hex view
    # redactHeaders: scrub credential-bearing HTTP header values
    # (authorization, cookie, x-api-key, ...), sensitive query params (token,
    # api_key, ...) and RESP auth command args (AUTH, HELLO, CONFIG SET
    # requirepass) from captured entries. The raw hex view is separate — set
    # rawBytes to -1 to close that path too.
    redactHeaders: true
    # redactPGParams: replace every Postgres Bind parameter value with
    # [REDACTED]. Off by default — unlike redactHeaders, bind params carry no
    # name at the wire level, so this is all-or-nothing and trades away
    # query-value visibility. Turn on if queries in your cluster do carry
    # unparameterized secrets in bind values.
    redactPGParams: false
  # tls: eBPF uprobe TLS capture (hybrid layer — keeps AF_PACKET for plaintext,
  # adds OpenSSL/boringssl uprobes for HTTPS). Off by default and fully
  # additive: AF_PACKET behavior is identical either way.
  # Needs hostPID (to discover other pods' TLS libraries via /proc) plus the
  # BPF/PERFMON/SYS_ADMIN/SYS_RESOURCE/SYS_PTRACE capabilities and bpffs/btf/
  # hostproc mounts below — all gated on tls.enabled so the default
  # AF_PACKET-only install keeps today's narrower privilege set.
  tls:
    enabled: false # attach OpenSSL/boringssl uprobes to decrypt TLS traffic
    goTLS: false   # Go crypto/tls uprobes — Phase 2b, not implemented yet
    debugfs: false # mount /sys/kernel/debug; usually unnecessary on modern kernels
  # AF_PACKET capture needs elevated privileges and the host network namespace.
  hostNetwork: true
  # privileged: false relies on the capabilities listed above (NET_RAW/
  # NET_ADMIN, plus the eBPF set when tls.enabled) instead of full privileged
  # access — those are all AF_PACKET/eBPF actually needs. Set this to true only
  # as a documented escape hatch for CNIs/kernels where the fine-grained
  # capability set isn't enough (rare; try the default first).
  privileged: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
  # nodeSelector / affinity: standard scheduling constraints for the capture
  # DaemonSet, passed through verbatim — e.g. to keep it off GPU/spot nodes.
  nodeSelector: {}
  affinity: {}
  # tolerations: the default tolerates every taint so the DaemonSet captures
  # on all nodes, control-plane included. Override to narrow coverage.
  tolerations:
    - operator: Exists
  # podAnnotations / extraLabels: extra metadata on the worker pod template.
  podAnnotations: {}
  extraLabels: {}

# networkPolicy: restrict which pods can reach the hub and front Services.
# Off by default (matches the chart's existing opt-in posture — see the note
# on hub.apiToken above: without this the hub Service is reachable, and its
# captured traffic readable, from any pod in the cluster). The default rules
# below only allow k8shark's own worker/front pods, plus anything else in
# this namespace for the front Service; add the extra peers your cluster
# needs (a cross-namespace ingress controller, a Prometheus scraping
# /metrics) via the two lists below rather than turning this off.
networkPolicy:
  enabled: false
  # Extra NetworkPolicyPeer entries (podSelector/namespaceSelector/ipBlock)
  # allowed to reach the hub on hub.port, in addition to k8shark's own
  # worker/front pods — e.g. a Prometheus in another namespace scraping
  # /metrics.
  hubExtraFrom: []
  # Extra NetworkPolicyPeer entries allowed to reach the front Service, in
  # addition to any pod already in this namespace — e.g. your ingress
  # controller's namespace or pods, if it doesn't run in this namespace.
  frontExtraFrom: []

# metrics: the hub's /metrics endpoint (Prometheus text format) is always on;
# this section only controls discovery. The pod template already carries
# prometheus.io/scrape annotations (legacy annotation-based discovery) — the
# ServiceMonitor below is for a prometheus-operator setup instead.
metrics:
  serviceMonitor:
    # enabled: off by default since it requires the monitoring.coreos.com/v1
    # ServiceMonitor CRD (prometheus-operator) to be installed in the cluster
    # — the chart fails loudly rather than silently skipping it if you turn
    # this on without that CRD present (see templates/servicemonitor.yaml).
    enabled: false
    interval: 30s
    # additionalLabels: merged onto the ServiceMonitor, e.g. to match the
    # `serviceMonitorSelector` your prometheus-operator Prometheus resource
    # uses (often release: <prometheus-release-name>).
    additionalLabels: {}

logLevel: info
