apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8shark-front
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8shark.labels" . | nindent 4 }}
    app.kubernetes.io/name: k8shark-front
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8shark-front
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8shark-front
        {{- with .Values.front.extraLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.front.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.front.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.front.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.front.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: front
          image: {{ include "k8shark.frontImage" . }}
          imagePullPolicy: {{ include "k8shark.imagePullPolicy" . }}
          env:
            # nginx proxies /api and /ws to the hub service.
            - name: HUB_HOST
              value: k8shark-hub.{{ .Release.Namespace }}.svc
            - name: HUB_PORT
              value: "{{ .Values.hub.port }}"
            - name: HUB_SCHEME
              value: {{ ternary "https" "http" .Values.hub.tls.enabled | quote }}
            # HUB_TOKEN is injected as a Bearer header on proxied requests, so
            # the dashboard keeps working when hub.apiToken is set (the front
            # service then becomes the intended access path to the data).
            {{- if .Values.hub.apiToken }}
            - name: HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: k8shark-api-token
                  key: token
            {{- else }}
            - name: HUB_TOKEN
              value: ""
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.front.port }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.front.port }}
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.front.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          # nginx:1.27-alpine writes to /var/cache/nginx, /var/run and /tmp, so
          # readOnlyRootFilesystem is intentionally left unset here (would need
          # emptyDir mounts for those paths to enable it without breaking startup).
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
          resources:
            {{- toYaml .Values.front.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: k8shark-front
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8shark.labels" . | nindent 4 }}
    app.kubernetes.io/name: k8shark-front
spec:
  type: {{ .Values.front.service.type }}
  selector:
    app.kubernetes.io/name: k8shark-front
  ports:
    - name: http
      port: {{ .Values.front.port }}
      targetPort: {{ .Values.front.port }}
