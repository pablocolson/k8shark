apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8shark-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8shark.labels" . | nindent 4 }}
---
{{- /* hubCA: workers must verify the hub's TLS cert against the ca.crt
     shipped in the TLS secret (cert-manager includes one). Only the ca.crt
     key is projected — the DaemonSet must never see the hub's private key. */}}
{{- $hubCA := and .Values.hub.tls.enabled .Values.hub.tls.caFromSecret }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: k8shark-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8shark.labels" . | nindent 4 }}
    app.kubernetes.io/name: k8shark-worker
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: k8shark-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8shark-worker
        {{- with .Values.worker.extraLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.worker.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: k8shark-worker
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      hostNetwork: {{ .Values.worker.hostNetwork }}
      {{- if .Values.worker.tls.enabled }}
      hostPID: true
      {{- end }}
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: worker
          image: {{ include "k8shark.binaryImage" . }}
          imagePullPolicy: {{ include "k8shark.imagePullPolicy" . }}
          args:
            - worker
            - --hub={{ ternary "wss" "ws" .Values.hub.tls.enabled }}://k8shark-hub.{{ .Release.Namespace }}.svc:{{ .Values.hub.port }}/ws/worker
            {{- if $hubCA }}
            - --hub-ca=/etc/k8shark/hub-ca/ca.crt
            {{- end }}
            - --node=$(NODE_NAME)
            - --iface={{ .Values.worker.iface }}
            - --log-level={{ .Values.logLevel }}
            {{- if .Values.worker.demo }}
            - --demo
            {{- end }}
            {{- if .Values.worker.valkeyPorts }}
            - --valkey-ports={{ join "," .Values.worker.valkeyPorts }}
            {{- end }}
            {{- if .Values.worker.amqpPorts }}
            - --amqp-ports={{ join "," .Values.worker.amqpPorts }}
            {{- end }}
            {{- if .Values.worker.httpPorts }}
            - --http-ports={{ join "," .Values.worker.httpPorts }}
            {{- end }}
            {{- if not .Values.worker.capture.captureBodies }}
            - --capture-bodies=false
            {{- end }}
            {{- if not .Values.worker.capture.redactHeaders }}
            - --redact-headers=false
            {{- end }}
            {{- if .Values.worker.capture.redactPGParams }}
            - --redact-pg-params=true
            {{- end }}
            {{- if .Values.worker.capture.bodyBytes }}
            - --body-bytes={{ .Values.worker.capture.bodyBytes }}
            {{- end }}
            {{- if .Values.worker.capture.rawBytes }}
            - --raw-bytes={{ .Values.worker.capture.rawBytes }}
            {{- end }}
            {{- if .Values.worker.tls.enabled }}
            - --enable-tls
            - --proc-root=/host/proc
            {{- end }}
            {{- if .Values.worker.tls.goTLS }}
            - --enable-go-tls
            {{- end }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            {{- if .Values.hub.workerToken }}
            # The worker authenticates with the dedicated worker token when
            # one is set (the worker CLI reads $K8SHARK_API_TOKEN for its hub
            # connection regardless of which secret key feeds it).
            - name: K8SHARK_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: k8shark-api-token
                  key: worker-token
            {{- else if .Values.hub.apiToken }}
            - name: K8SHARK_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: k8shark-api-token
                  key: token
            {{- end }}
          securityContext:
            privileged: {{ .Values.worker.privileged }}
            # Force root: the image ships USER 65532 (non-root), but AF_PACKET +
            # eBPF capture needs its caps in the effective set, which a non-root
            # UID drops (no ambient caps) — EPERM on socket(AF_PACKET) otherwise.
            runAsUser: 0
            {{- if not .Values.worker.privileged }}
            allowPrivilegeEscalation: false
            {{- end }}
            readOnlyRootFilesystem: true
            seccompProfile:
              # The default seccomp profile is known to block bpf()/
              # perf_event_open() on some runtimes; only relax it when the
              # eBPF uprobe path actually needs those syscalls.
              type: {{ if .Values.worker.tls.enabled }}Unconfined{{ else }}RuntimeDefault{{ end }}
            capabilities:
              drop: [ALL]
              add:
                - NET_RAW
                - NET_ADMIN
                {{- if .Values.worker.tls.enabled }}
                - BPF
                - PERFMON
                - SYS_ADMIN
                - SYS_RESOURCE
                - SYS_PTRACE
                {{- end }}
          {{- if or .Values.worker.tls.enabled $hubCA }}
          volumeMounts:
            {{- if .Values.worker.tls.enabled }}
            - { name: bpffs, mountPath: /sys/fs/bpf, mountPropagation: HostToContainer }
            - { name: btf, mountPath: /sys/kernel/btf, readOnly: true }
            - { name: hostproc, mountPath: /host/proc, readOnly: true }
            {{- if .Values.worker.tls.debugfs }}
            - { name: debugfs, mountPath: /sys/kernel/debug }
            {{- end }}
            {{- end }}
            {{- if $hubCA }}
            - { name: hub-ca, mountPath: /etc/k8shark/hub-ca, readOnly: true }
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      {{- if or .Values.worker.tls.enabled $hubCA }}
      volumes:
        {{- if .Values.worker.tls.enabled }}
        - { name: bpffs, hostPath: { path: /sys/fs/bpf, type: DirectoryOrCreate } }
        - { name: btf, hostPath: { path: /sys/kernel/btf, type: Directory } }
        - { name: hostproc, hostPath: { path: /proc, type: Directory } }
        {{- if .Values.worker.tls.debugfs }}
        - { name: debugfs, hostPath: { path: /sys/kernel/debug, type: Directory } }
        {{- end }}
        {{- end }}
        {{- if $hubCA }}
        - name: hub-ca
          secret:
            secretName: {{ .Values.hub.tls.secretName }}
            items:
              - { key: ca.crt, path: ca.crt }
        {{- end }}
      {{- end }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
