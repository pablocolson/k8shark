apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8shark-hub
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8shark.labels" . | nindent 4 }}
---
# Read-only enrichment permissions: the hub maps captured IPs to pod/service/
# workload names by listing the API (internal/hub/k8s.go). Without this the
# hub still runs — entries just keep bare ip:port endpoints.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8shark-hub-enrich
  labels:
    {{- include "k8shark.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8shark-hub-enrich
  labels:
    {{- include "k8shark.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8shark-hub-enrich
subjects:
  - kind: ServiceAccount
    name: k8shark-hub
    namespace: {{ .Release.Namespace }}
---
{{- if .Values.hub.apiToken }}
apiVersion: v1
kind: Secret
metadata:
  name: k8shark-api-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8shark.labels" . | nindent 4 }}
stringData:
  token: {{ .Values.hub.apiToken | quote }}
---
{{- end }}
{{- if gt (int .Values.hub.replicas) 1 }}
{{- fail "hub.replicas > 1 is not supported: the ring buffer, worker registry and WebSocket fan-out are all in-memory state local to one pod, so a second replica silently sees only part of the traffic/workers/clients rather than sharing state. Keep hub.replicas at 1." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8shark-hub
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8shark.labels" . | nindent 4 }}
    app.kubernetes.io/name: k8shark-hub
spec:
  replicas: {{ .Values.hub.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: k8shark-hub
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8shark-hub
      annotations:
        # Legacy annotation-based Prometheus discovery (e.g. a scrape config
        # using kubernetes_sd_configs against pods). A prometheus-operator
        # setup should use metrics.serviceMonitor.enabled instead. Harmless
        # when nothing scrapes annotations.
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.hub.port | quote }}
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: k8shark-hub
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: hub
          image: {{ include "k8shark.binaryImage" . }}
          imagePullPolicy: {{ include "k8shark.imagePullPolicy" . }}
          args:
            - hub
            - --port={{ .Values.hub.port }}
            - --log-level={{ .Values.logLevel }}
            {{- if .Values.hub.bufferSize }}
            - --buffer={{ .Values.hub.bufferSize }}
            {{- end }}
          {{- if .Values.hub.apiToken }}
          env:
            - name: K8SHARK_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: k8shark-api-token
                  key: token
          {{- end }}
          ports:
            - name: hub
              containerPort: {{ .Values.hub.port }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.hub.port }}
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.hub.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
          resources:
            {{- toYaml .Values.hub.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: k8shark-hub
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8shark.labels" . | nindent 4 }}
    app.kubernetes.io/name: k8shark-hub
spec:
  selector:
    app.kubernetes.io/name: k8shark-hub
  ports:
    - name: hub
      port: {{ .Values.hub.port }}
      targetPort: {{ .Values.hub.port }}
