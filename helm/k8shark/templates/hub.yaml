apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8shark-hub
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8shark.labels" . | nindent 4 }}
---
# Read-only enrichment permissions: the hub maps captured IPs to pod/service/
# workload names by listing the API (internal/hub/k8s.go). Without this the
# hub still runs — entries just keep bare ip:port endpoints.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "k8shark.enrichClusterRoleName" . }}
  labels:
    {{- include "k8shark.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "k8shark.enrichClusterRoleName" . }}
  labels:
    {{- include "k8shark.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "k8shark.enrichClusterRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: k8shark-hub
    namespace: {{ .Release.Namespace }}
---
{{- if or .Values.hub.apiToken .Values.hub.workerToken .Values.hub.adminToken }}
apiVersion: v1
kind: Secret
metadata:
  name: k8shark-api-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8shark.labels" . | nindent 4 }}
stringData:
  {{- with .Values.hub.apiToken }}
  token: {{ . | quote }}
  {{- end }}
  {{- with .Values.hub.workerToken }}
  worker-token: {{ . | quote }}
  {{- end }}
  {{- with .Values.hub.adminToken }}
  admin-token: {{ . | quote }}
  {{- end }}
---
{{- end }}
{{- if gt (int .Values.hub.replicas) 1 }}
{{- fail "hub.replicas > 1 is not supported: the ring buffer, worker registry and WebSocket fan-out are all in-memory state local to one pod, so a second replica silently sees only part of the traffic/workers/clients rather than sharing state. Keep hub.replicas at 1." }}
{{- end }}
{{- if and .Values.hub.tls.enabled (not .Values.hub.tls.secretName) }}
{{- fail "hub.tls.enabled requires hub.tls.secretName: a kubernetes.io/tls Secret (tls.crt/tls.key) in the release namespace, e.g. issued by a cert-manager Certificate for k8shark-hub.<namespace>.svc." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8shark-hub
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8shark.labels" . | nindent 4 }}
    app.kubernetes.io/name: k8shark-hub
spec:
  replicas: {{ .Values.hub.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: k8shark-hub
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8shark-hub
        {{- with .Values.hub.extraLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Legacy annotation-based Prometheus discovery (e.g. a scrape config
        # using kubernetes_sd_configs against pods). A prometheus-operator
        # setup should use metrics.serviceMonitor.enabled instead. Harmless
        # when nothing scrapes annotations. hub.podAnnotations is merged on
        # top, key-wise — a user annotation wins over these defaults rather
        # than rendering a duplicate key.
        {{- $ann := dict "prometheus.io/scrape" "true" "prometheus.io/port" (.Values.hub.port | toString) "prometheus.io/path" "/metrics" }}
        {{- if .Values.hub.tls.enabled }}{{- $_ := set $ann "prometheus.io/scheme" "https" }}{{- end }}
        {{- range $k, $v := .Values.hub.podAnnotations }}{{- $_ := set $ann $k (toString $v) }}{{- end }}
        {{- toYaml $ann | nindent 8 }}
    spec:
      serviceAccountName: k8shark-hub
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.hub.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hub.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hub.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: hub
          image: {{ include "k8shark.binaryImage" . }}
          imagePullPolicy: {{ include "k8shark.imagePullPolicy" . }}
          args:
            - hub
            - --port={{ .Values.hub.port }}
            - --log-level={{ .Values.logLevel }}
            {{- if .Values.hub.bufferSize }}
            - --buffer={{ .Values.hub.bufferSize }}
            {{- end }}
            {{- if .Values.hub.tls.enabled }}
            - --tls-cert=/etc/k8shark/tls/tls.crt
            - --tls-key=/etc/k8shark/tls/tls.key
            {{- end }}
            {{- with .Values.hub.export.file }}
            - --export-file={{ . }}
            {{- end }}
            {{- with .Values.hub.export.webhook }}
            - --export-webhook={{ . }}
            {{- end }}
          {{- if or .Values.hub.apiToken .Values.hub.workerToken .Values.hub.adminToken }}
          env:
            {{- if .Values.hub.apiToken }}
            - name: K8SHARK_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: k8shark-api-token
                  key: token
            {{- end }}
            {{- if .Values.hub.workerToken }}
            - name: K8SHARK_WORKER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: k8shark-api-token
                  key: worker-token
            {{- end }}
            {{- if .Values.hub.adminToken }}
            - name: K8SHARK_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: k8shark-api-token
                  key: admin-token
            {{- end }}
          {{- end }}
          ports:
            - name: hub
              containerPort: {{ .Values.hub.port }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.hub.port }}
              {{- if .Values.hub.tls.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.hub.port }}
              {{- if .Values.hub.tls.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
          {{- if .Values.hub.tls.enabled }}
          volumeMounts:
            - { name: tls, mountPath: /etc/k8shark/tls, readOnly: true }
          {{- end }}
          resources:
            {{- toYaml .Values.hub.resources | nindent 12 }}
      {{- if .Values.hub.tls.enabled }}
      volumes:
        - name: tls
          secret:
            secretName: {{ .Values.hub.tls.secretName }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: k8shark-hub
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8shark.labels" . | nindent 4 }}
    app.kubernetes.io/name: k8shark-hub
spec:
  selector:
    app.kubernetes.io/name: k8shark-hub
  ports:
    - name: hub
      port: {{ .Values.hub.port }}
      targetPort: {{ .Values.hub.port }}
