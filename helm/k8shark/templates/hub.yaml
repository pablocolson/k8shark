apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8shark-hub
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8shark.labels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8shark-hub
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8shark.labels" . | nindent 4 }}
    app.kubernetes.io/name: k8shark-hub
spec:
  replicas: {{ .Values.hub.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: k8shark-hub
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8shark-hub
    spec:
      serviceAccountName: k8shark-hub
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: hub
          image: {{ include "k8shark.binaryImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - hub
            - --port={{ .Values.hub.port }}
            - --log-level={{ .Values.logLevel }}
          ports:
            - name: hub
              containerPort: {{ .Values.hub.port }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.hub.port }}
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.hub.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
          resources:
            {{- toYaml .Values.hub.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: k8shark-hub
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8shark.labels" . | nindent 4 }}
    app.kubernetes.io/name: k8shark-hub
spec:
  selector:
    app.kubernetes.io/name: k8shark-hub
  ports:
    - name: hub
      port: {{ .Values.hub.port }}
      targetPort: {{ .Values.hub.port }}
